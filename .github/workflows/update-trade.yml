name: Update UEX Data

# Refresh commodity trade routes AND in-game ship-buy prices from the public UEX
# Corp API every 8 hours. UEX needs no token, so no secrets are required. Prices
# are a snapshot — the app shows the snapshot time and a staleness note.

on:
  schedule:
    - cron: "0 */8 * * *"   # every 8 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-trade
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run UEX ingests
        run: |
          export RUN_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"
          python scripts/ingest-trade.py
          python scripts/ingest-ships.py
          python scripts/ingest-mining.py
      - name: Commit changes
        run: |
          git config user.name "trade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/trade-routes.json data/commodity-buy.json data/ship-buy.json data/mining-gear.json
          if git diff --cached --quiet; then
            echo "No UEX-data changes this run."
          else
            git commit -m "chore: UEX snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
