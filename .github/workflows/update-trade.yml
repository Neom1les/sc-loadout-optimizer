name: Update Trade Data

# Refresh commodity trade routes from the public UEX Corp API every 8 hours.
# UEX needs no token, so no secrets are required. Prices are a snapshot — the
# app shows the snapshot time and a staleness note.

on:
  schedule:
    - cron: "0 */8 * * *"   # every 8 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-trade
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run trade ingest
        run: |
          export RUN_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"
          python scripts/ingest-trade.py
      - name: Commit changes
        run: |
          git config user.name "trade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/trade-routes.json data/commodity-buy.json
          if git diff --cached --quiet; then
            echo "No trade-data changes this run."
          else
            git commit -m "chore: trade snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
