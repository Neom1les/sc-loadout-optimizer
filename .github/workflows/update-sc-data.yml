name: Update SC Data

# Auto-refresh the Earnings Finder + Patch Hub data from the current Star Citizen
# patch. Runs weekly and can be triggered manually. Requires the repository
# secret ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions).

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-sc-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet anthropic

      - name: Run data updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_DATE: ${{ github.run_id && '' }}
        run: |
          export RUN_DATE="$(date -u +%Y-%m-%d)"
          python scripts/update-sc-data.py

      - name: Commit changes
        run: |
          git config user.name "sc-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "chore: auto-update SC data ($(date -u +%Y-%m-%d))"
            git push
          fi
